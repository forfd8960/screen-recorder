# cargo-deny configuration
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Analyse all targets, including dev-dependencies.
all-features = true

# ---------------------------------------------------------------------------
# [advisories] – Block crates with known security issues
# ---------------------------------------------------------------------------
[advisories]
version = 2
# Deny crates with unpatched security advisories
yanked = "deny"

# ---------------------------------------------------------------------------
# [licenses] – Allowed license set
# ---------------------------------------------------------------------------
[licenses]
version = 2
# Permit permissive licenses only; deny GPL and LGPL families.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
    "AGPL-3.0",
]
# Treat unlicensed crates as an error
unlicensed = "deny"
# Treat copyleft crates as an error
copyleft = "deny"

# ---------------------------------------------------------------------------
# [bans] – Duplicate crates and banned packages
# ---------------------------------------------------------------------------
[bans]
# Deny multiple versions of the same crate (warn is also an option)
multiple-versions = "warn"
# Deny wildcarded dependencies
wildcards = "deny"

# ---------------------------------------------------------------------------
# [sources] – Allowed crate registries / git sources
# ---------------------------------------------------------------------------
[sources]
# Only allow crates.io as a source; deny unknown registries and git sources
# unless explicitly listed.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
